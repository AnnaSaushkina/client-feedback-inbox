services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskdb_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword123
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server-test:
    build: ./server
    environment:
      - DATABASE_URL=postgresql://postgres:testpassword123@postgres-test:5432/taskdb_test
    depends_on:
      postgres-test:
        condition: service_healthy
    restart: unless-stopped

  nginx-test:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.test.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/test:/usr/share/nginx/html:ro
    depends_on:
      - server-test
    restart: unless-stopped

volumes:
  pgdata_test:
