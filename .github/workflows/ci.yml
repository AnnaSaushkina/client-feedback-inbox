name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test --run

  # ── GitHub Pages (localStorage, без бэкенда) ──────────────────────────────
  deploy-github:
    name: Deploy → GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          VITE_API_URL: ""
          DEPLOY_TARGET: github
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  # ── VPS: сервер + оба фронтенда ──────────────────────────────────────────
  deploy-vps:
    name: Deploy → VPS (тест :8080 + прод :80)
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # --- Сервер ---
      - name: Build server
        run: |
          cd server && pnpm install --frozen-lockfile && pnpm run build
          tar -czf server-dist.tar.gz -C server/dist .

      - name: Upload server dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: server-dist.tar.gz
          target: /tmp/

      - name: Restart servers (pm2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            for dir in /root/task-manager-server /root/task-manager-test; do
              rm -rf "$dir/dist" && mkdir -p "$dir/dist"
              tar -xzf /tmp/server-dist.tar.gz -C "$dir/dist"
            done
            pm2 delete task-manager task-manager-test 2>/dev/null || true
            PORT=3000 DB_PATH=/root/task-manager-server/tasks.json \
              pm2 start /root/task-manager-server/dist/index.js --name task-manager
            PORT=3001 DB_PATH=/root/task-manager-test/tasks-test.json \
              pm2 start /root/task-manager-test/dist/index.js --name task-manager-test
            pm2 save

      # --- Фронтенд тест ---
      - name: Build frontend (test)
        run: pnpm build
        env:
          VITE_API_URL: "http://${{ secrets.VPS_HOST }}:8080/api"

      - name: Upload frontend (test)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: dist/
          target: /var/www/test/
          strip_components: 1

      # --- Фронтенд прод ---
      - name: Build frontend (prod)
        run: pnpm build
        env:
          VITE_API_URL: "http://${{ secrets.VPS_HOST }}/api"

      - name: Upload frontend (prod)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: dist/
          target: /var/www/html/
          strip_components: 1
